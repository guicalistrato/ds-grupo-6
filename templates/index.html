<!DOCTYPE html>
<head>
    <title>Boole</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <script>
        function openSidebar() {
            document.getElementById("Sidebar").style.width = "250px";
            document.getElementById("main-content").style.marginLeft = "250px";
        }

        function closeSidebar() {
            document.getElementById("Sidebar").style.width = "0";
            document.getElementById("main-content").style.marginLeft = "0";
        }
    </script>
    <div id="Sidebar" class="sidebar">
        <div id="top-sidebar">
            <div>
                <img src="../assets/logo-robo.png" alt="Boole" style="height: 30px;">
                <span id="top-sidebar-title">Sua área</span>
            </div>
            <div>
                <a href="javascript:void(0)" class="closebtn" onclick="closeSidebar()">☰</a>
            </div>
            
        </div>

        <button id="nova-conversa">Nova Conversa</button>

        <div class="collapsible-wrapper">
            <button class="toggle-button">
                <span class="arrow">▶</span> Conversas
            </button>

            <div class="content">
                <ul>
                    <!--ajustar isso aqui pra se tornar dinâmico-->
                    <li>tópico1</li>
                    <li>tópico2</li>
                    <li>tópico3</li>
                </ul>
            </div>
        </div>
        <div class="collapsible-wrapper">
            <button class="toggle-button">
                <span class="arrow">▶</span> Arquivos
            </button>

            <div id="collapseContent" class="content">
                <ul>
                    <!--ajustar isso aqui pra se tornar dinâmico-->
                    <li>arquivo1</li>
                    <li>arquivo2</li>
                    <li>arquivo3</li>
                </ul>
            </div>
        </div>
        <script>
            const toggles = document.querySelectorAll('.toggle-button'); // lista de todos os botões com essa id pra aplicar a função em todos

            toggles.forEach(btn =>{

                btn.addEventListener('click', function() {
                    this.classList.toggle('active');  //rotação da seta 
                
                    const content = this.nextElementSibling; //encontrando o conteúdo da div

                    content.classList.toggle('open'); // fazendo o conteudo aparecer
                });
            })

           
        </script>
        
    </div>

    <button class="openbtn" onclick="openSidebar()">☰</button>
    <div id="main-content">
        <h3>Digite sua dúvida: </h3>
        <div>
            <input type="text" id="duvida" placeholder="Dúvida">
            <button type="button" onclick="resposta_API()">Enviar</button>
        </div>

        <h3>Resposta do Boole:</h3>
        <p id="resposta" style="color: blue;"></p>

        <script>
            function resposta_API()
            {
                const duvida = document.getElementById('duvida').value;

                fetch('/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ duvida : duvida }),
                })
                // transforma a resposta em json
                .then(response => response.json()) 
                .then(data => {
                    if (data.resultado) {
                        // coloca a resposta na tela
                        document.getElementById('resposta').innerText = data.resultado;
                    } else if (data.erro) {
                        alert(data.erro);
                    }
                })
                .catch(error => console.error('Erro:', error));

            }
        </script>
    </div>

</body>
