<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boole</title>
</head>
<body>
    <h3>Digite sua dúvida:</h3>
    <div>
        <input type="text" id="duvida" placeholder="Dúvida">
        <button type="button" onclick="resposta_API()">Enviar</button>
    </div>

    <h3>Resposta do Boole:</h3>
    <p id="resposta" style="color: blue;"></p>

    <script>
        async function resposta_API() {
            const duvida = document.getElementById('duvida').value.trim();

            if (!duvida) {
                alert('Digite uma dúvida antes de enviar.');
                return;
            }

            try {
                const res = await fetch('/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duvida }),
                });
                const data = await res.json();

                if (data.resultado) {
                    document.getElementById('resposta').innerText = data.resultado;
                } else if (data.erro) {
                    alert(data.erro);
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro de conexão. Tente novamente.');
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') resposta_API();
        });
    </script>
</body>
</html>
