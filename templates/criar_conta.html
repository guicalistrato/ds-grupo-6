<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Criar Conta</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/criar_conta.css')}}">
</head>
<body>
    <div id="bloco-central">
        <span id="titulo">Crie sua conta</span>
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <input type="password" id="senha_confirma" placeholder="Confirme sua senha">
        <button type="button" onclick="criacao_conta()" id="botao-criar-conta">Continuar</button>
        <div id="botoes-extras">
            <a href="/login">
                <button id="botao-voltar" type="button">Voltar</button>
            </a>
            <button id="cont-sem-login" type="button">Continuar sem login</button>
        </div>
    </div>

    <script src="{{url_for('static', filename='js/criar_conta.js')}}"></script>

</body>
</html>
